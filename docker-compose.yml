services:

  postgres:
    image: postgres:16-alpine
    container_name: metabase-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: ${MB_DB_PASS}
    volumes:
      - metabase-db-data:/var/lib/postgresql/data
    networks:
      - metabase-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    # Porta exposta diretamente apenas para debug local.
    # Em produção o acesso é feito via nginx (:80/:443).
    # ports:
    #   - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: ${MB_DB_PASS}
      MB_DB_HOST: postgres
      MB_SITE_URL: ${MB_SITE_URL:-https://localhost}
      JAVA_TIMEZONE: America/Sao_Paulo
    volumes:
      - metabase-plugins:/plugins
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metabase-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    container_name: nginx-metabase
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/metabase.conf:/etc/nginx/conf.d/metabase.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - metabase
    networks:
      - metabase-net

volumes:
  metabase-db-data:
  metabase-plugins:

networks:
  metabase-net:
    driver: bridge
